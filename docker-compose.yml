services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: nfip-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=NfipWarehouse2026!
    ports:
      - "1433:1433"
    volumes:
      - ./datasets:/data
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqlserver-data:
